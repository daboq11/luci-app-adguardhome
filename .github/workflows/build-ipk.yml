name: Build & Release luci-app-adguardhome (filogic/mt7981)

on:
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # 必须有这个才能创建 Release

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          repository: sirpdboy/luci-app-adguardhome
          path: app  # 源码单独放 app/，不和 sdk 混

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3 rsync unzip zlib1g-dev file wget zstd jq

      - name: Download OpenWrt SDK 24.10.1 (filogic)
        run: |
          VER=24.10.1
          TARGET=mediatek
          SUBTARGET=filogic
          BASE="https://downloads.openwrt.org/releases/$VER/targets/$TARGET/$SUBTARGET/"
          FILE=$(curl -s "$BASE" | grep -oP 'openwrt-sdk-[^"]+\.tar\.zst' | head -n1)
          mkdir -p sdk
          wget -q "$BASE$FILE" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst -C sdk
          SDK_DIR=$(find sdk -type d -name 'openwrt-sdk-*' | head -n1)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      - name: Build luci-app-adguardhome
        run: |
          cd "$SDK_DIR"
          mkdir -p package/luci-app-adguardhome
          # 只复制 app/ 下的源码，绝对不会包含 sdk
          cp -r "$GITHUB_WORKSPACE"/app/* package/luci-app-adguardhome/

          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/luci-app-adguardhome/clean V=s
          make package/luci-app-adguardhome/compile V=s -j1

      - name: Collect ipk files
        run: |
          mkdir -p ipk
          find "$SDK_DIR"/bin/packages/ -name '*adguardhome*.ipk' -exec cp {} ipk/ \;
          ls -lh ipk/

      # 👇 新增：自动生成版本号 + 创建 Release + 上传 ipk
      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}  # 每次构建新 tag
          name: OpenWrt 24.10.1 filogic (mt7981) Build ${{ github.run_number }}
          body: |
            自动构建：luci-app-adguardhome for OpenWrt 24.10.1 (mediatek/filogic/mt7981)
            源码：https://github.com/sirpdboy/luci-app-adguardhome
          files: ipk/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
