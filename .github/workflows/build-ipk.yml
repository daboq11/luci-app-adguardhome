name: Build luci-app-adguardhome mt7981

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          repository: sirpdboy/luci-app-adguardhome

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3 rsync unzip zlib1g-dev file wget zstd jq

      - name: Download OpenWrt SDK
        run: |
          TARGET=mediatek
          SUBTARGET=mt7981
          VER=23.05.4
          BASE="https://downloads.openwrt.org/releases/$VER/targets/$TARGET/$SUBTARGET/"
          FILE=$(curl -s "$BASE" | grep -oP 'openwrt-sdk-[^"]+\.tar\.zst' | head -n1)
          URL="$BASE$FILE"
          echo "SDK URL: $URL"
          mkdir -p _sdk
          wget -v "$URL" -O _sdk/sdk.tar.zst
          tar --zstd -xf _sdk/sdk.tar.zst -C _sdk
          SDK=$(find _sdk -type d -name 'openwrt-sdk-*' | head -n1)
          echo "SDK_DIR=$SDK" >> $GITHUB_ENV

      - name: Build package
        run: |
          cd "$SDK_DIR"
          mkdir -p package/luci-app-adguardhome
          cp -r "$GITHUB_WORKSPACE"/* package/luci-app-adguardhome/
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/luci-app-adguardhome/clean V=s
          make package/luci-app-adguardhome/compile V=s -j1

      - name: Collect ipk
        run: |
          mkdir -p ipk
          find "$SDK_DIR"/bin/packages/ -name '*adguardhome*.ipk' -exec cp {} ipk/ \;
          ls ipk/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-adguardhome-mt7981
          path: ipk/*.ipk
